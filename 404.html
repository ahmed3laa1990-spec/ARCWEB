<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | ARC Construction</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0E2A47 0%, #081B30 100%);
      color: #fff;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(244,180,0,0.15), transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(244,180,0,0.08), transparent 50%);
      pointer-events: none;
    }
    .container {
      max-width: 600px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .logo {
      width: 80px; height: 80px;
      margin: 0 auto 32px;
      display: block;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    h1 {
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #F4B400 0%, #FFD54F 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -4px;
    }
    h2 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 600;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
    }
    .actions {
      display: flex; gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #F4B400; color: #0E2A47;
    }
    .btn-primary:hover {
      background: #FFD54F;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(244,180,0,0.3);
    }
    .btn-ghost {
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.25);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
    }
    .helpful {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
    .helpful a {
      color: #F4B400;
      text-decoration: none;
      margin: 0 8px;
    }
    .helpful a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/logo.png" alt="ARC" class="logo">
    <h1>404</h1>
    <h2>Page Not Found · الصفحة غير موجودة</h2>
    <p>
      The page you're looking for doesn't exist or has been moved.<br>
      الصفحة التي تبحث عنها غير موجودة أو تم نقلها.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home · الرئيسية
      </a>
      <a href="/#contact" class="btn btn-ghost">Contact Us · تواصل معنا</a>
    </div>
    <div class="helpful">
      Looking for:
      <a href="/#projects">Projects</a> ·
      <a href="/#services">Services</a> ·
      <a href="/#careers">Careers</a> ·
      <a href="/#about">About</a>
    </div>
  </div>
</body>
</html>
